<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHO님 - 3D</title>

    <link rel="stylesheet" href="./static/css/common.css">
    <link rel="stylesheet" href="./static/css/3d.css">
</head>
<body>
    <main class="main">
        <section class="sec" id="intro"></section>
        <section class="sec" id="notice"></section>

        <section class="sec process-sec" id="process">
            <div class="sec-head">
                <div class="sec-head__inner">
                <div class="sec-head__badge">
                    <span class="ui-dot is-pink"></span>
                    <span>PROCESS</span>
                </div>
                <h2 class="sec-head__title">작업 순서</h2>
                </div>
            </div>

            <div class="process-tree">
            <div class="process-tree__line"></div>

            <div class="process-step process-step--left">
                <div class="process-step__node">01</div>
                <div class="process-card">
                <h3 class="process-card__title">문의 및 견적 확인</h3>
                </div>
            </div>

            <div class="process-step process-step--right">
                <div class="process-step__node">02</div>
                <div class="process-card">
                <h3 class="process-card__title">러프 작업</h3>
                </div>
            </div>

            <div class="process-step process-step--left">
                <div class="process-step__node">03</div>
                <div class="process-card">
                <h3 class="process-card__title">컨펌 및 수정 (1회)</h3>
                </div>
            </div>

            <div class="process-step process-step--right">
                <div class="process-step__node">04</div>
                <div class="process-card">
                <h3 class="process-card__title">작업 시작</h3>
                </div>
            </div>

            <div class="process-step process-step--left">
                <div class="process-step__node">05</div>
                <div class="process-card">
                <h3 class="process-card__title">완성본 공개 (자잘한 수정)</h3>
                </div>
            </div>

            <div class="process-step process-step--rifght">
                <div class="process-step__node">06</div>
                <div class="process-card">
                <h3 class="process-card__title">컨펌 및 수정 (2회)</h3>
                </div>
            </div>

            <div class="process-step process-step--left">
                <div class="process-step__node">07</div>
                <div class="process-card process-card--accent">
                <h3 class="process-card__title">작업물 전달</h3>
                </div>
            </div>
            </div>
        </section>

        <section class="sec usage-sec" id="usage"></section>
        <section class="sec" id="process"></section>
        <section class="sec" id="sample"></section>

        <section class="sec form-sec" id="form">
            <div class="form-wrap ui-window">
                <div class="form-wrap__bar">
                <div class="ui-window__title">
                    <span class="ui-dot is-butter"></span>
                    <span>CONTACT FORM</span>
                </div>
                </div>

                <div class="form-wrap__body ui-window__body">
                <div class="sec-head form-sec__head">
                    <div class="sec-head__inner">
                    <div class="sec-head__badge form-sec__badge">
                        <span class="ui-dot is-butter"></span>
                        <span>APPLICATION</span>
                    </div>
                    <h2 class="sec-head__title">문의 양식</h2>
                    <p class="sec-head__desc">
                        아래 내용을 작성한 뒤 <strong>양식 복사</strong> 버튼으로 내용을 복사해서 전달해주세요.
                    </p>
                    </div>
                </div>

                <div class="form-notice">
                    <p>⚠ 수령 희망 날짜는 작업 일정에 따라 추가금이 발생할 수 있습니다.</p>
                </div>

                <form class="contact-form" id="contactForm">
                    <div class="contact-grid contact-grid--2">
                    <div class="form-field">
                        <label class="label" for="nickname">닉네임</label>
                        <input
                        class="ui-input"
                        type="text"
                        id="nickname"
                        name="nickname"
                        placeholder="닉네임을 입력해주세요."
                        >
                    </div>

                    <div class="form-field">
                        <label class="label" for="receiveDate">수령 희망 날짜</label>
                        <input
                        class="ui-input"
                        type="date"
                        id="receiveDate"
                        name="receiveDate"
                        >
                    </div>
                    </div>

                    <div class="contact-grid contact-grid--2">
                    <fieldset class="form-box">
                        <legend class="label">작업과정 비공개</legend>
                        <div class="option-stack">
                        <label class="radio-card">
                            <input type="radio" name="privateProcess" value="YES (+50,000원)">
                            <span>YES <small>(추가금 50,000원)</small></span>
                        </label>

                        <label class="radio-card">
                            <input type="radio" name="privateProcess" value="NO" checked>
                            <span>NO</span>
                        </label>
                        </div>
                    </fieldset>

                    <fieldset class="form-box">
                        <legend class="label">포트폴리오 비공개</legend>
                        <div class="option-stack">
                        <label class="radio-card">
                            <input type="radio" name="privatePortfolio" value="YES (+100,000원)">
                            <span>YES <small>(추가금 100,000원)</small></span>
                        </label>

                        <label class="radio-card">
                            <input type="radio" name="privatePortfolio" value="NO" checked>
                            <span>NO</span>
                        </label>
                        </div>
                    </fieldset>
                    </div>

                    <div class="form-field">
                    <span class="label">신청 타입</span>

                    <div class="type-grid type-grid--3d">
                        <label class="type-card">
                        <input type="radio" name="applyType" value="3D 헤드 디자인">
                        <span class="type-card__inner">
                            <strong>3D 헤드 디자인</strong>
                            <small>헤드 작업</small>
                        </span>
                        </label>

                        <label class="type-card">
                        <input type="radio" name="applyType" value="3D 안구 디자인">
                        <span class="type-card__inner">
                            <strong>3D 안구 디자인</strong>
                            <small>안구 디자인 작업</small>
                        </span>
                        </label>

                        <label class="type-card">
                        <input type="radio" name="applyType" value="3D 전신 삼면도">
                        <span class="type-card__inner">
                            <strong>3D 전신 삼면도</strong>
                            <small>전신 기준 삼면도 작업</small>
                        </span>
                        </label>
                    </div>
                    </div>

                    <div class="form-field">
                    <label class="label" for="extraNotes">추가사항</label>
                    <textarea
                        class="ui-textarea"
                        id="extraNotes"
                        name="extraNotes"
                        placeholder="추가로 전달하고 싶은 내용을 자유롭게 작성해주세요."
                    ></textarea>
                    </div>

                    <div class="form-field">
                    <label class="label" for="characterInfo">신청 캐릭터</label>
                    <textarea
                        class="ui-textarea"
                        id="characterInfo"
                        name="characterInfo"
                        placeholder="아직 정해지지 않았다면 대략적인 느낌, 참고 자료, 원하는 방향 등을 작성해주세요."
                    ></textarea>
                    </div>

                    <div class="form-actions">
                    <button type="button" class="ui-btn is-ghost" id="resetFormBtn">초기화</button>
                    <button type="button" class="ui-btn is-butter" id="copyFormBtn">양식 복사</button>
                    </div>
                </form>
                </div>
            </div>
        </section>
    </main>
</body>

<script src="./static/js/3d.js" defer></script>
<script>
(function () {
  const PARENT_ORIGIN = '*';
  let lastHeight = 0;
  let resizeTimer = null;
  let started = false;

  function sendLoading(state) {
    try {
      window.parent.postMessage(
        { type: 'ARTMUG_IFRAME_LOADING', state },
        PARENT_ORIGIN
      );
    } catch (err) {}
  }

  function getDocHeight() {
    const body = document.body;
    const html = document.documentElement;

    return Math.max(
      body ? body.scrollHeight : 0,
      body ? body.offsetHeight : 0,
      body ? body.getBoundingClientRect().height : 0,
      html ? html.clientHeight : 0,
      html ? html.scrollHeight : 0,
      html ? html.offsetHeight : 0,
      html ? html.getBoundingClientRect().height : 0
    );
  }

  function postHeight(force = false) {
    const nextHeight = Math.ceil(getDocHeight());
    if (!nextHeight) return;

    if (!force && Math.abs(nextHeight - lastHeight) < 4) return;

    lastHeight = nextHeight;

    try {
      window.parent.postMessage(
        {
          type: 'ARTMUG_IFRAME_HEIGHT',
          height: nextHeight
        },
        PARENT_ORIGIN
      );
    } catch (err) {}
  }

  function scheduleHeight(force = false) {
    clearTimeout(resizeTimer);

    requestAnimationFrame(() => {
      postHeight(force);

      requestAnimationFrame(() => {
        postHeight(force);
      });
    });

    resizeTimer = setTimeout(() => {
      postHeight(force);
    }, 120);

    setTimeout(() => postHeight(force), 300);
    setTimeout(() => postHeight(force), 700);
  }

  function bindImageLoad() {
    const images = Array.from(document.images || []);
    if (!images.length) {
      scheduleHeight(true);
      return;
    }

    images.forEach(img => {
      if (img.complete) return;

      img.addEventListener('load', () => scheduleHeight(true), { once: true });
      img.addEventListener('error', () => scheduleHeight(true), { once: true });
    });
  }

  function bindAccordionChanges() {
    document.addEventListener('click', function (e) {
      const trigger = e.target.closest(
        '.ui-accordion__trigger, .collab-accordion__trigger, [aria-expanded]'
      );
      if (!trigger) return;

      setTimeout(() => scheduleHeight(true), 0);
      setTimeout(() => scheduleHeight(true), 180);
      setTimeout(() => scheduleHeight(true), 360);
      setTimeout(() => scheduleHeight(true), 700);
    }, true);

    document.addEventListener('transitionend', function (e) {
      const target = e.target;
      if (!target) return;

      if (
        target.classList.contains('ui-accordion__panel') ||
        target.classList.contains('collab-accordion__panel') ||
        e.propertyName === 'height' ||
        e.propertyName === 'max-height'
      ) {
        scheduleHeight(true);
      }
    }, true);
  }

  function bindMutationObserver() {
    const mo = new MutationObserver(() => {
      scheduleHeight(false);
    });

    mo.observe(document.body, {
      childList: true,
      subtree: true,
      attributes: true
    });
  }

  function bindResizeEvents() {
    window.addEventListener('resize', () => scheduleHeight(true));

    window.addEventListener('load', () => {
      scheduleHeight(true);
      sendLoading('done');
    });

    window.addEventListener('message', function (e) {
      if (!e.data) return;

      if (e.data.type === 'ARTMUG_PARENT_READY') {
        scheduleHeight(true);
      }
    });
  }

  function start() {
    if (started) return;
    started = true;

    sendLoading('start');
    bindImageLoad();
    bindAccordionChanges();
    bindMutationObserver();
    bindResizeEvents();

    scheduleHeight(true);
    setTimeout(() => scheduleHeight(true), 500);
    setTimeout(() => {
      scheduleHeight(true);
      sendLoading('done');
    }, 1200);
  }

  if (document.readyState !== 'loading') {
    start();
  } else {
    document.addEventListener('DOMContentLoaded', start);
  }
})();
</script>
</html>
